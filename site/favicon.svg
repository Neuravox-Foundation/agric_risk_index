<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="DAVARS data dashboard">
  <defs>
    <linearGradient id="g" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#008300"/>
      <stop offset="1" stop-color="#2a78d6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- ascending data bars -->
  <g fill="#ffffff">
    <rect x="6"  y="19" width="4" height="7"  rx="1.2"/>
    <rect x="13" y="14" width="4" height="12" rx="1.2"/>
    <rect x="20" y="9"  width="4" height="17" rx="1.2"/>
  </g>
  <!-- trend line over the bars -->
  <polyline points="8,17 15,12 22,7 27,10" fill="none" stroke="#ffffff"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="27" cy="10" r="2.1" fill="#ffffff"/>
</svg>
